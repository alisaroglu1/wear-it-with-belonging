{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="auth-wrapper">
    <div class="auth-card">

        <div class="auth-header">
            <h1>Hesap Oluştur</h1>
            <p>Aramıza katılın</p>
        </div>

        <form method="POST" action="{% url 'account_signup' %}">
            {% csrf_token %}

            {% for field in form %}
                <div class="field-group">
                    <label>{{ field.label }}</label>
                    {{ field }}
                    {% for error in field.errors %}
                        <p class="field-error">{{ error }}</p>
                    {% endfor %}
                </div>
            {% endfor %}

            <button type="submit" class="btn-auth">Kayıt Ol</button>
        </form>

        <p class="auth-switch">
            Zaten hesabın var mı? <a href="{% url 'account_login' %}">Giriş Yap</a>
        </p>

    </div>
</div>

{% endblock %}
