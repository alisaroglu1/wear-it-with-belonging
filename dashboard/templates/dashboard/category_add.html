{% extends "dashboard/base_dashboard.html" %}
{% load static %}

{% block dash_content %}

<div class="dash-header">
    <h1>Yeni Kategori Ekle</h1>
    <p>Kategori bilgilerini doldurun.</p>
</div>

<div class="dash-section" style="max-width:500px;">
    <form method="POST">
        {% csrf_token %}

        <div class="field-group">
            <label>Kategori Adı</label>
            <input type="text" name="name" id="name" placeholder="Örn: Üst Giyim" required>
        </div>

        <div class="field-group">
            <label>Slug</label>
            <input type="text" name="slug" id="slug" placeholder="ust-giyim" required>
            <p style="font-size:0.72rem; color:var(--muted); margin-top:0.3rem;">URL'de görünecek kısım. Boşluk yerine - kullanın.</p>
        </div>

        <div style="display:flex; gap:1rem; margin-top:1rem;">
            <button type="submit" class="btn-auth" style="width:auto; padding:0.7rem 2rem;">Kategori Ekle</button>
            <a href="{% url 'dashboard:category_list' %}" style="padding:0.7rem 2rem; border:1px solid var(--border); font-size:0.85rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted);">İptal</a>
        </div>

    </form>
</div>

{% endblock %}

{% block scripts %}
<script>
    document.getElementById('name').addEventListener('input', function() {
        const slug = this.value
            .toLowerCase()
            .replace(/ğ/g, 'g')
            .replace(/ü/g, 'u')
            .replace(/ş/g, 's')
            .replace(/ı/g, 'i')
            .replace(/ö/g, 'o')
            .replace(/ç/g, 'c')
            .replace(/[^a-z0-9]+/g, '-')
            .replace(/^-+|-+$/g, '');
        document.getElementById('slug').value = slug;
    });
</script>
{% endblock %}
